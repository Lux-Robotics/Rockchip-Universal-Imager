name: Cross-platform build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false

      matrix:
        include:

          # Windows x64
          - os: windows-latest
            name: windows-x64
            arch: x64

          # Windows ARM64
          - os: windows-latest
            name: windows-arm64
            arch: ARM64

          # Linux x64
          - os: ubuntu-24.04
            name: linux-x64

          # Linux ARM64
          - os: ubuntu-24.04-arm
            name: linux-arm64

          # macOS Intel
          - os: macos-13
            name: macos-intel

          # macOS ARM64
          - os: macos-14
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux dependencies
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      # Configure
      - name: Configure
        run: |
          cmake -B build -G Ninja ${{ runner.os == 'Windows' && format('-A {0}', matrix.arch) || '' }}

      # Build
      - name: Build
        run: |
          cmake --build build --config Release

      # Upload artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}

          path: |
            build/**