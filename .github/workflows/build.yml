name: Cross-platform build

# Build requirements (one-time setup on self-hosted runners)
# Windows:
# - Visual Studio 2022/2026 with C++ workload (MSVC v143, Windows 10/11 SDK)
# - CMake in PATH
# - Ninja in PATH
# - Git for Windows in PATH
# - MSYS2 at C:\msys64 with packages: autoconf, automake, libtool, pkgconf, make,
#   mingw-w64-x86_64-toolchain, mingw-w64-x86_64-libusb
# - libusb-win32 driver files at C:\libusb-win32
# Linux:
# - build-essential, cmake, git, ninja-build, pkg-config
# - libgtk-3-dev, libwebkit2gtk-4.1-dev, libudev-dev, libusb-1.0-0-dev
# - autoconf, automake, libtool, dh-autoreconf
# macOS:
# - Xcode Command Line Tools
# - Homebrew packages: cmake, ninja, pkgconf, libusb, autoconf, automake, libtool

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RKDEV_REPO: https://github.com/lux-robotics/rkdeveloptool.git
  RKDEV_TAG: master
  LIBWDI_LIBUSB0_DIR: C:/libusb-win32
  # Artifactory configuration
  ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
  ARTIFACTORY_REPO: ${{ secrets.ARTIFACTORY_REPO }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}

jobs:
  build:
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:

        - os: windows-latest
          runs_on: [self-hosted, Windows, X64]
          name: Windows_11
          arch: x64
          msystem: MINGW64
          msys2_libusb: mingw-w64-x86_64-libusb
          msys2_toolchain: mingw-w64-x86_64-toolchain
          rkdev_enable: true
          libwdi_enable: true

        # - os: windows-latest
        #   runs_on: Windows_11
        #   name: windows-arm64
        #   arch: ARM64
        #   msystem: CLANGARM64
        #   msys2_libusb: mingw-w64-clang-aarch64-libusb
        #   msys2_toolchain: mingw-w64-clang-aarch64-toolchain
        #   rkdev_enable: false
        #   libwdi_enable: false

        - os: ubuntu-24.04
          runs_on: [self-hosted, Linux, X64]
          name: Ubuntu_22

        # - os: ubuntu-24.04-arm
        #   runs_on: Ubuntu_22
        #   name: linux-arm64

        - os: macos-13
          runs_on: [self-hosted, macOS, X64]
          name: MacOS_Ventura
          osx_arch: x86_64

        # - os: macos-14
        #   runs_on: MacOS_Ventura
        #   name: macos-arm64
        #   osx_arch: arm64

    # Self-hosted runner configuration
    # Replace labels with your actual runner labels
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configure Windows
      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DRKDEV_REPO=${{ env.RKDEV_REPO }} -DRKDEV_TAG=${{ env.RKDEV_TAG }} -DRKDEV_BASH=C:/msys64/usr/bin/bash.exe -DRKDEV_MSYSTEM=${{ matrix.msystem }} -DRKDEV_ENABLE=${{ matrix.rkdev_enable }} -DLIBWDI_ENABLE=${{ matrix.libwdi_enable }} -DLIBWDI_LIBUSB0_DIR="${{ env.LIBWDI_LIBUSB0_DIR }}"

      # Configure Linux
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }}

      # Configure macOS
      - name: Configure macOS
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}
          
      # Build (Windows)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --config Release

      # Build (Linux/macOS)
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake --build build --config Release

      # Build package for upload
      - name: Build Package
        run: |
          mkdir -p upload_pkg
          tar -czf upload_pkg/${{ matrix.name }}.tar.gz -C build/bin .

      # Upload to Artifactory (Windows)
      - name: Upload to Artifactory (Windows)
        if: ${{ runner.os == 'Windows' && env.ARTIFACTORY_URL != '' && env.ARTIFACTORY_REPO != '' && env.ARTIFACTORY_USER != '' && env.ARTIFACTORY_TOKEN != '' }}
        shell: cmd
        run: |
          set "SAFE_WORKFLOW=%GITHUB_WORKFLOW: =-%"
          set "DEST_PATH=%ARTIFACTORY_URL%/%ARTIFACTORY_REPO%/%GITHUB_REPOSITORY%/%SAFE_WORKFLOW%/%GITHUB_RUN_NUMBER%/${{ matrix.name }}.tar.gz"
          echo Uploading to: %DEST_PATH%
          curl.exe -u "%ARTIFACTORY_USER%:%ARTIFACTORY_TOKEN%" -T "upload_pkg/${{ matrix.name }}.tar.gz" "%DEST_PATH%"
          echo Upload complete

      # Upload to Artifactory (Linux/macOS)
      - name: Upload to Artifactory (Unix)
        shell: bash
        if: ${{ runner.os != 'Windows' && env.ARTIFACTORY_URL != '' && env.ARTIFACTORY_REPO != '' && env.ARTIFACTORY_USER != '' && env.ARTIFACTORY_TOKEN != '' }}
        run: |
          set -euo pipefail
          # Build the remote path in Artifactory.
          SAFE_WORKFLOW="${GITHUB_WORKFLOW// /-}"
          DEST_PATH="${ARTIFACTORY_URL}/${ARTIFACTORY_REPO}/${GITHUB_REPOSITORY}/${SAFE_WORKFLOW}/${GITHUB_RUN_NUMBER}/${{ matrix.name }}.tar.gz"
          echo "Uploading to: $DEST_PATH"
          curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" \
            -T "upload_pkg/${{ matrix.name }}.tar.gz" \
            "$DEST_PATH"
          echo "Upload complete"
