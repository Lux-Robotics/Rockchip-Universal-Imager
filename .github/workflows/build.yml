name: Cross-platform build

on:
  workflow_dispatch:

env:
  RKDEV_REPO: https://github.com/lux-robotics/rkdeveloptool.git
  RKDEV_TAG: master

jobs:
  build:
    strategy:
      fail-fast: false

      matrix:
        include:

          # Windows x64
          - os: windows-latest
            name: windows-x64
            arch: x64
            msystem: MINGW64
            msys2_libusb: mingw-w64-x86_64-libusb

          # Windows ARM64
          - os: windows-latest
            name: windows-arm64
            arch: ARM64
            msystem: CLANGARM64
            msys2_libusb: mingw-w64-clang-aarch64-libusb

          # Linux x64
          - os: ubuntu-24.04
            name: linux-x64

          # Linux ARM64
          - os: ubuntu-24.04-arm
            name: linux-arm64

          # macOS Intel
          - os: macos-13
            name: macos-intel
            osx_arch: x86_64

          # macOS ARM64
          - os: macos-14
            name: macos-arm64
            osx_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows dependencies (MSYS2 for rkdeveloptool)
      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            base-devel
            autoconf
            automake
            libtool
            pkg-config
            ${{ matrix.msys2_libusb }}

      # Linux dependencies
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            dh-autoreconf \
            autoconf \
            automake \
            libtool

      # macOS dependencies
      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install libusb autoconf automake libtool pkg-config

      # Configure Windows
      - name: Configure Windows
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DRKDEV_REPO=${{ env.RKDEV_REPO }} -DRKDEV_TAG=${{ env.RKDEV_TAG }} -DRKDEV_BASH=C:/msys64/usr/bin/bash.exe -DRKDEV_MSYSTEM=${{ matrix.msystem }}

      # Configure Linux
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }}

      # Configure macOS
      - name: Configure macOS
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}
          
      # Build
      - name: Build
        run: |
          cmake --build build --config Release

      # Upload artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}

          path: |
            build/**