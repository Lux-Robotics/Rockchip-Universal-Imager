# Build the Tauri app only (no rkdeveloptool compile, no zip packaging).
#
# Artifact per matrix cell:
#   app-<os>-<arch>/
#     rockchip-universal-imager[.exe]
#     APP.txt
#
# Used standalone (workflow_dispatch) or by package.yaml (workflow_call).
#
# Runners: each OS host builds its own OS.
#
# linux-aarch64 is intentionally omitted here: full Tauri/WebKitGTK cannot be
# reliably cross-linked from x86_64 (pkg-config/linker pick host x86_64 libs).
# Ship linux-aarch64 GUI only from a native arm64 Linux runner later.
# rkdeveloptool still builds linux-aarch64 in build-rkdeveloptool.yaml.

name: Build app

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-app-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  app:
    name: app (${{ matrix.os_label }}-${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            shell: bash
            os_label: linux
            arch_label: x86_64
            rust_target: x86_64-unknown-linux-gnu
            app_name: rockchip-universal-imager
          # linux-aarch64 app: see file header (needs native arm64 runner)
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: x86_64
            rust_target: x86_64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
          - runner: [self-hosted, Windows, X64]
            shell: C:/msys64/usr/bin/bash.exe --noprofile --norc -e {0}
            os_label: windows
            arch_label: aarch64
            rust_target: aarch64-pc-windows-msvc
            app_name: rockchip-universal-imager.exe
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: x86_64
            rust_target: x86_64-apple-darwin
            app_name: rockchip-universal-imager
          - runner: [self-hosted, macOS, X64]
            shell: bash
            os_label: macos
            arch_label: aarch64
            rust_target: aarch64-apple-darwin
            app_name: rockchip-universal-imager

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure Rust stable + target
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"

          # rustup/cargo live here; runner jobs often lack this on PATH.
          CARGO_BIN="${CARGO_HOME:-${HOME:-}/.cargo}/bin"
          if [[ -n "${USERPROFILE:-}" ]]; then
            CARGO_BIN_WIN="$(ci_to_unix_path "${USERPROFILE}/.cargo/bin")"
            ci_path_prepend "$CARGO_BIN_WIN"
          fi
          ci_path_prepend "$CARGO_BIN"
          # shellcheck disable=SC1091
          [[ -f "${CARGO_HOME:-$HOME/.cargo}/env" ]] && source "${CARGO_HOME:-$HOME/.cargo}/env"
          # Windows MSYS: env file may use Windows paths; force bin dir
          export PATH="${CARGO_BIN}${CARGO_BIN_WIN:+:$CARGO_BIN_WIN}:$PATH"
          hash -r 2>/dev/null || true

          if ! command -v rustup >/dev/null 2>&1; then
            echo "rustup not found; installing for $(id -un)…"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
            # shellcheck disable=SC1091
            source "$HOME/.cargo/env"
            ci_path_prepend "$HOME/.cargo/bin"
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"
          command -v rustc
          command -v cargo
          rustc -vV
          cargo -vV

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: app-${{ matrix.os_label }}-${{ matrix.arch_label }}

      - name: Install tauri-cli
        env:
          OS_LABEL: ${{ matrix.os_label }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          cd "$(ci_workspace)"
          ci_setup_toolchain_path "$OS_LABEL"
          CARGO_BIN="${CARGO_HOME:-${HOME:-}/.cargo}/bin"
          ci_path_prepend "$CARGO_BIN"
          if [[ -n "${USERPROFILE:-}" ]]; then
            ci_path_prepend "$(ci_to_unix_path "${USERPROFILE}/.cargo/bin")"
          fi
          # shellcheck disable=SC1091
          [[ -f "${CARGO_HOME:-$HOME/.cargo}/env" ]] && source "${CARGO_HOME:-$HOME/.cargo}/env"
          cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (--no-bundle)
        env:
          OS_LABEL: ${{ matrix.os_label }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          RUST_TARGET: ${{ matrix.rust_target }}
          APP_NAME: ${{ matrix.app_name }}
        run: |
          set -euo pipefail
          source packaging/ci/ci-env.sh
          WS="$(ci_workspace)"
          cd "$WS"
          ci_setup_toolchain_path "$OS_LABEL"
          CARGO_BIN="${CARGO_HOME:-${HOME:-}/.cargo}/bin"
          ci_path_prepend "$CARGO_BIN"
          if [[ -n "${USERPROFILE:-}" ]]; then
            ci_path_prepend "$(ci_to_unix_path "${USERPROFILE}/.cargo/bin")"
          fi
          # shellcheck disable=SC1091
          [[ -f "${CARGO_HOME:-$HOME/.cargo}/env" ]] && source "${CARGO_HOME:-$HOME/.cargo}/env"

          case "$OS_LABEL-$ARCH_LABEL" in
            macos-x86_64)
              export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER="${CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_x86_64_apple_darwin="${CFLAGS_x86_64_apple_darwin:--arch x86_64}"
              ;;
            macos-aarch64)
              export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="${CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER:-clang}"
              export CFLAGS_aarch64_apple_darwin="${CFLAGS_aarch64_apple_darwin:--arch arm64}"
              ;;
          esac

          if [[ "$OS_LABEL" == "windows" && ! -f src-tauri/icons/icon.ico ]]; then
            echo "ERROR: src-tauri/icons/icon.ico missing (required for Windows tauri-build)" >&2
            exit 1
          fi

          cargo tauri build --no-bundle --target "$RUST_TARGET"

          APP_BIN="${WS}/src-tauri/target/${RUST_TARGET}/release/${APP_NAME}"
          test -f "$APP_BIN"
          OUT="${WS}/dist/app-${OS_LABEL}-${ARCH_LABEL}"
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cp "$APP_BIN" "$OUT/$APP_NAME"
          chmod +x "$OUT/$APP_NAME" 2>/dev/null || true
          {
            echo "app artifact"
            echo "os=$OS_LABEL arch=$ARCH_LABEL target=$RUST_TARGET"
            echo "app_name=$APP_NAME"
            echo "git_sha=${GITHUB_SHA:-unknown}"
            date -u +"%Y-%m-%dT%H:%M:%SZ"
            ls -la "$OUT"
          } >"$OUT/APP.txt"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/app-${{ matrix.os_label }}-${{ matrix.arch_label }}/
          if-no-files-found: error
