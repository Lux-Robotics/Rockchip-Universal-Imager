name: Installer build

# Native installer artifacts: 3 OSes x 2 architectures = 6 jobs.
# RUI_PORTABLE=OFF -> NSIS (Windows), DragNDrop DMG (macOS), DEB+RPM
# (Linux). No "portable" marker, so the app logs to the per-user OS location.
# The portable (zip-and-run) artifacts are built by the separate
# build-portable.yml workflow.
#
# Build requirements (one-time setup on self-hosted runners)
# - C++23-capable toolchain (saucer requires C++23)
# Windows:
# - Visual Studio 2022/2026 with C++ workload (MSVC v143, Windows 10/11 SDK)
# - CMake 3.25+, Ninja, Git for Windows in PATH
# - MSYS2 at C:\msys64 with: autoconf, automake, libtool, pkgconf, make,
#   mingw-w64-x86_64-toolchain, mingw-w64-x86_64-libusb (x64) and/or
#   mingw-w64-clang-aarch64-toolchain, mingw-w64-clang-aarch64-libusb (arm64)
# - libusb-win32 driver files at C:\libusb-win32
# - NSIS in PATH (makensis)
# Linux:
# - build-essential, cmake 3.25+, git, ninja-build, pkg-config
# - libgtk-3-dev, libwebkit2gtk-4.1-dev, libadwaita-1-dev, libudev-dev, libusb-1.0-0-dev
# - autoconf, automake, libtool, dh-autoreconf
# - dpkg-dev + rpm (rpmbuild) for the .deb/.rpm packages
# macOS:
# - Xcode Command Line Tools
# - Homebrew packages: cmake 3.25+, ninja, pkgconf, libusb, autoconf, automake, libtool

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RKDEV_REPO: https://github.com/lux-robotics/rkdeveloptool.git
  RKDEV_TAG: master
  LIBWDI_LIBUSB0_DIR: C:/libusb-win32
  # Artifactory configuration
  ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
  ARTIFACTORY_REPO: ${{ secrets.ARTIFACTORY_REPO }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
  # macOS code signing + notarization. All optional: if MACOS_CERTIFICATE is
  # empty the macOS jobs skip signing and fall back to the ad-hoc signature
  # from the build (unnotarized). MACOS_CERTIFICATE is a base64-encoded
  # Developer ID Application .p12; MACOS_SIGN_IDENTITY is its identity string
  # ("Developer ID Application: NAME (TEAMID)"). Notarization additionally
  # needs APPLE_ID + APPLE_APP_PASSWORD (an app-specific password) + APPLE_TEAM_ID.
  MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
  MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
  MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build:
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:

        # ---------- Windows ----------
        - name: Windows_x64_installer
          os: windows
          arch: x64
          runs_on: [self-hosted, Windows, X64]
          cpack_generator: NSIS
          vcvars: vcvars64.bat
          msystem: MINGW64
          msys2_libusb: mingw-w64-x86_64-libusb
          rkdev_enable: "true"
          libwdi_enable: "true"

        - name: Windows_arm64_installer
          os: windows
          arch: arm64
          runs_on: [self-hosted, Windows, ARM64]
          cpack_generator: NSIS
          vcvars: vcvarsarm64.bat
          msystem: CLANGARM64
          msys2_libusb: mingw-w64-clang-aarch64-libusb
          rkdev_enable: "true"
          libwdi_enable: "true"

        # ---------- Linux ----------
        - name: Linux_x64_installer
          os: linux
          arch: x64
          runs_on: [self-hosted, Linux, X64]
          cpack_generator: DEB;RPM

        - name: Linux_arm64_installer
          os: linux
          arch: arm64
          runs_on: [self-hosted, Linux, ARM64]
          cpack_generator: DEB;RPM

        # ---------- macOS ----------
        - name: MacOS_x86_64_installer
          os: macos
          arch: x86_64
          runs_on: [self-hosted, macOS, X64]
          cpack_generator: DragNDrop
          osx_arch: x86_64

        - name: MacOS_arm64_installer
          os: macos
          arch: arm64
          runs_on: [self-hosted, macOS, ARM64]
          cpack_generator: DragNDrop
          osx_arch: arm64

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------- Configure -----------------------
      - name: Configure Windows
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\${{ matrix.vcvars }}"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ^
            -DRUI_PORTABLE=OFF ^
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} -DRKDEV_TAG=${{ env.RKDEV_TAG }} ^
            -DRKDEV_BASH=C:/msys64/usr/bin/bash.exe -DRKDEV_MSYSTEM=${{ matrix.msystem }} ^
            -DRKDEV_ENABLE=${{ matrix.rkdev_enable }} ^
            -DLIBWDI_ENABLE=${{ matrix.libwdi_enable }} -DLIBWDI_LIBUSB0_DIR="${{ env.LIBWDI_LIBUSB0_DIR }}"

      - name: Configure Linux
        if: matrix.os == 'linux'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRUI_PORTABLE=OFF \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }} \
            -Dsaucer_no_compiler_version_check=ON

      - name: Configure macOS
        if: matrix.os == 'macos'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DRUI_PORTABLE=OFF \
            -DRKDEV_REPO=${{ env.RKDEV_REPO }} \
            -DRKDEV_TAG=${{ env.RKDEV_TAG }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} \
            -Dsaucer_no_compiler_version_check=ON

      # ------------------------- Build -------------------------
      - name: Build (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\VC\Auxiliary\Build\${{ matrix.vcvars }}"
          cmake --build build --config Release

      - name: Build (Unix)
        if: matrix.os != 'windows'
        run: cmake --build build --config Release

      # ------------------- macOS signing -------------------
      # Runs before packaging so the DMG carries the signed, stapled app.
      # Skipped (falling back to the build's ad-hoc signature) when no cert
      # secret is configured.
      - name: Import signing certificate (macOS)
        if: ${{ matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' }}
        run: |
          set -euo pipefail
          KEYCHAIN="$GITHUB_WORKSPACE/signing.keychain-db"
          KP="ci-$RANDOM-$RANDOM"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # Preserve the runner's existing user keychain search list so the
          # cleanup step can restore it (these are the user's own machines).
          ORIG=$(security list-keychains -d user | sed 's/[\"[:space:]]//g' | tr '\n' ' ')
          echo "ORIG_KEYCHAINS=$ORIG" >> "$GITHUB_ENV"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the search list so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $ORIG
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Sign app (macOS)
        if: ${{ matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' }}
        run: |
          set -euo pipefail
          APP="build/bin/rockchip-universal-imager.app"
          ENT="$GITHUB_WORKSPACE/packaging/macos/entitlements.plist"
          ID="$MACOS_SIGN_IDENTITY"
          # Inner-to-outer: nested dylibs + companion executables first (with
          # the hardened runtime, which notarization requires), then the whole
          # bundle last. libusb is signed with the same identity, so the app's
          # library validation accepts loading it. In the installer layout the
          # companions live inside Contents/MacOS.
          find "$APP" -type f \( -name '*.dylib' -o -perm +111 \) \
            -exec codesign --force --timestamp --options runtime -s "$ID" {} \;
          codesign --force --timestamp --options runtime --entitlements "$ENT" -s "$ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize and staple (macOS)
        if: ${{ matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' && env.APPLE_ID != '' }}
        run: |
          set -euo pipefail
          APP="build/bin/rockchip-universal-imager.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          # Staple the ticket to the .app; the DMG built next then carries a
          # notarized+stapled app that passes Gatekeeper offline.
          xcrun stapler staple "$APP"
          rm -f "$RUNNER_TEMP/notarize.zip"

      # ------------------------ Package ------------------------
      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          mkdir upload_pkg
          cd build
          cpack -G "${{ matrix.cpack_generator }}" -C Release -B "%GITHUB_WORKSPACE%\upload_pkg"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          mkdir -p upload_pkg
          cd build
          cpack -G "${{ matrix.cpack_generator }}" -C Release -B "$GITHUB_WORKSPACE/upload_pkg"

      # cpack drops the package(s) plus staging dirs into upload_pkg; keep only
      # the finished artifacts before upload.
      - name: Collect artifacts (Unix)
        if: matrix.os != 'windows'
        run: |
          cd upload_pkg
          find . -maxdepth 1 -type d ! -name '_CPack_Packages' ! -name '.' -exec rm -rf {} + || true
          rm -rf _CPack_Packages
          ls -la

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          if exist upload_pkg\_CPack_Packages rmdir /s /q upload_pkg\_CPack_Packages
          dir upload_pkg

      # ------------------- Upload to Artifactory -------------------
      - name: Upload to Artifactory (Windows)
        if: ${{ matrix.os == 'windows' && env.ARTIFACTORY_URL != '' && env.ARTIFACTORY_REPO != '' && env.ARTIFACTORY_USER != '' && env.ARTIFACTORY_TOKEN != '' }}
        shell: cmd
        run: |
          set "SAFE_WORKFLOW=%GITHUB_WORKFLOW: =-%"
          for %%f in (upload_pkg\*) do (
            echo Uploading %%~nxf
            curl.exe -u "%ARTIFACTORY_USER%:%ARTIFACTORY_TOKEN%" -T "%%f" "%ARTIFACTORY_URL%/%ARTIFACTORY_REPO%/%GITHUB_REPOSITORY%/%SAFE_WORKFLOW%/%GITHUB_RUN_NUMBER%/${{ matrix.name }}/%%~nxf"
          )
          echo Upload complete

      - name: Upload to Artifactory (Unix)
        if: ${{ matrix.os != 'windows' && env.ARTIFACTORY_URL != '' && env.ARTIFACTORY_REPO != '' && env.ARTIFACTORY_USER != '' && env.ARTIFACTORY_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          SAFE_WORKFLOW="${GITHUB_WORKFLOW// /-}"
          BASE="${ARTIFACTORY_URL}/${ARTIFACTORY_REPO}/${GITHUB_REPOSITORY}/${SAFE_WORKFLOW}/${GITHUB_RUN_NUMBER}/${{ matrix.name }}"
          for f in upload_pkg/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")"
            curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" -T "$f" "${BASE}/$(basename "$f")"
          done
          echo "Upload complete"

      # Always remove the temporary signing keychain and restore the runner's
      # original keychain search list - these are self-hosted machines, so a
      # leftover keychain would accumulate and could shadow later builds.
      - name: Clean up signing keychain (macOS)
        if: ${{ always() && matrix.os == 'macos' && env.MACOS_CERTIFICATE != '' }}
        run: |
          security delete-keychain "$GITHUB_WORKSPACE/signing.keychain-db" 2>/dev/null || true
          if [ -n "${ORIG_KEYCHAINS:-}" ]; then
            security list-keychains -d user -s $ORIG_KEYCHAINS || true
          fi
